name: base_dp

task_name: base_dp
action_mode: ${oc.env:UR5E_ACTION_MODE,eef}
agent_pos_key: ${oc.env:UR5E_AGENT_POS_KEY,robot_eef_pose}
action_key: ${oc.env:UR5E_ACTION_KEY,cartesian_action}
agent_pos_dim: ${eval:'int("${oc.env:UR5E_AGENT_POS_DIM,7}")'}
action_dim: ${eval:'int("${oc.env:UR5E_ACTION_DIM,7}")'}
is_bimanual: ${eval:'"${oc.env:UR5E_IS_BIMANUAL,false}".lower() in ["1", "true", "yes", "on"]'}

shape_meta: &shape_meta
  obs:
    camera_0:
      shape: [3, 224, 224]
      type: rgb
      horizon: 2
    agent_pos:
      shape:
        - ${eval:'int("${oc.env:UR5E_AGENT_POS_DIM,7}")'}
      type: robot_state
      horizon: 2
  action:
    shape:
      - ${eval:'int("${oc.env:UR5E_ACTION_DIM,7}")'}
    horizon: 16

env_runner:
  _target_: env_runner.robot_image_runner.RobotImageRunner
  max_steps: 0
  n_obs_steps: ${...n_obs_steps}
  n_action_steps: ${...n_action_steps}
  task_name: ${..task_name}
  frequency: 10
  action_exec_latency: 0.05
  robot_ip: 192.168.1.5
  robot_left_ip: ${oc.env:UR5E_LEFT_ROBOT_IP,${.robot_ip}}
  robot_right_ip: ${oc.env:UR5E_RIGHT_ROBOT_IP,${.robot_ip}}
  camera_indices: [0]
  single_arm_type: ${oc.env:UR5E_SINGLE_ARM,right}
  is_bimanual: ${..is_bimanual}
  use_gripper: true
  dummy_robot: false
  speed_slider_value: 1.0
  dry_run: false
  interactive_control: true
  image_size: [224, 224]
  action_mode: ${..action_mode}

dataset:
  _target_: dataset.image_dataset.ImageDataset
  zarr_path: ${oc.env:UR5E_RAW_ZARR_PATH,data/ur5e_raw.zarr}
  camera_keys: [camera_0_color]
  image_size: [224, 224]
  agent_pos_key: ${..agent_pos_key}
  action_key: ${..action_key}
  horizon: ${...horizon}
  pad_before: ${eval:'${...n_obs_steps}-1'}
  pad_after: ${eval:'${...n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
